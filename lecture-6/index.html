<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Six product card</title>
    <link rel="stylesheet" href="style.css">
    <style>
        
        
    </style>
</head>
<body>
       <div class="card">
            <div class="container">
                <div>
                    <img src="https://images.pexels.com/photos/9667336/pexels-photo-9667336.jpeg" alt="">
                    <h3>Mobile</h3>
                    <h4 class="price">₹ 10,000</h4>
                    <button>Buy now</button>
                </div>
                <div>
                    <img src="https://images.pexels.com/photos/5082555/pexels-photo-5082555.jpeg" alt="">
                    <h3>Desktop</h3>
                    <h4 class="price">₹50,0000</h4>
                    <button>Buy now</button>
                </div>
                <div>   
                    <img src="https://images.pexels.com/photos/8532753/pexels-photo-8532753.jpeg" alt="">
                    <h3>Laptop</h3>
                    <h4 class="price">₹79,999</h4>
                    <button>Buy now</button>
                </div>
                <div>
                    <img src=" https://images.pexels.com/photos/987586/pexels-photo-987586.jpeg" alt="">
                    <h3>Tv</h3>
                    <h4 class="price">₹30,999</h4>
                    <button>Buy now</button>
                </div>
                <div>
                    <img src="https://images.pexels.com/photos/3949101/pexels-photo-3949101.jpeg" alt="">
                    <h3>Tablet</h3>
                    <h4 class="price">₹49,999</h4>
                    <button>Buy now</button>
                </div>
                <div>
                    <img src="https://media.istockphoto.com/id/480956062/photo/hi-fi-stereo-system.jpg?s=612x612&w=0&k=20&c=2CID3OhUq9vjKOGtlYudQEsyXDNHSrVB5wAKIIsEvvA=" alt="">
                    <h3>Home thetre</h3>
                    <h4 class="price">₹29,999</h4>
                    <button>Buy now</button>
                </div>
            </div>
       </div>
</body>
</html>
